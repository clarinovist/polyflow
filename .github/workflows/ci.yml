name: CI
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Generate Prisma Client
      run: npx prisma generate
      
    - name: Run ESLint
      run: npm run lint
      
    - name: Run Unit Tests
      run: npm run test:run
      
    - name: Build Next.js
      run: npm run build
      env:
        # Dummy DB URL for build step since Next.js build might require Prisma client
        DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/polyflow_test"
