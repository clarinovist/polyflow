name: Production Pipeline

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  # ─────────────────────────────────────────────
  # 1. Automated Release PR (runs independently)
  # ─────────────────────────────────────────────
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          release-type: node
          token: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────
  # 2. Tests
  # ─────────────────────────────────────────────
  test:
    name: Test & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        
      - name: Run ESLint
        run: npm run lint

      - name: Run Tests with Coverage
        run: npx vitest run --coverage

      - name: Build Next.js
        run: npm run build
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/polyflow_test"

      - name: Validate Nginx configuration
        run: |
          mkdir -p certs/live/polyflow.uk
          openssl req -x509 -nodes -days 1 -newkey rsa:2048 \
            -keyout certs/live/polyflow.uk/privkey.pem \
            -out certs/live/polyflow.uk/fullchain.pem \
            -subj "/CN=polyflow.uk"
          echo "events {} http { include /etc/nginx/conf.d/*.conf; }" > nginx.conf
          docker run --rm \
            --add-host polyflow-app:127.0.0.1 \
            -v ${{ github.workspace }}/nginx/polyflow.conf:/etc/nginx/conf.d/polyflow.conf:ro \
            -v ${{ github.workspace }}/nginx.conf:/etc/nginx/nginx.conf:ro \
            -v ${{ github.workspace }}/certs:/etc/letsencrypt:ro \
            nginx:alpine nginx -t

  # ─────────────────────────────────────────────
  # 3. Build & Push Docker Image
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      - name: Lowercase Repo Name
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.REPO }}:latest
          build-args: |
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.REPO }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.REPO }}:buildcache,mode=max

  # ─────────────────────────────────────────────
  # 4. Deploy to VPS
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: CR_PAT
          script: |
            set -e
            cd /root/polyflow
            git fetch origin main
            git reset --hard origin/main
            echo "$CR_PAT" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull polyflow
            docker compose up -d polyflow
            docker image prune -f
        env:
          CR_PAT: ${{ secrets.CR_PAT }}
